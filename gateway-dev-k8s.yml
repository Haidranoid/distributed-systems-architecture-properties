spring:
  kafka:
    bootstrap-servers: pop-os:9092
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: authentication-service
              uri: http://authentication-service-srv:8080
              predicates:
                - Path=/api/v1/auth/**
            - id: accounts-service
              uri: http://accounts-service-srv:8081
              predicates:
                - Path=/api/v1/accounts/**
            - id: media-generation-service
              uri: http://media-generation-service-srv:8083
              predicates:
                - Path=/api/v1/media-generation/**
            - id: content-service
              uri: http://content-service-srv:8084
              predicates:
                - Path=/api/v1/content/**
application:
  security:
    jwt:
      algorithm: RS256
      public-key: 